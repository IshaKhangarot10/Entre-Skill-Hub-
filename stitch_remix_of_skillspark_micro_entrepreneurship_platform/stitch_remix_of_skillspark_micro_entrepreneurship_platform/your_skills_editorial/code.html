<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SkillSpark - Skill Profiling</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#1c1b1b",
                        "on-primary-fixed-variant": "#474646",
                        "tertiary-fixed": "#e6e1df",
                        "surface-dim": "#dadada",
                        "surface-tint": "#5f5e5e",
                        "background": "#f9f9f9",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#1d1b1a",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#868381",
                        "on-secondary-fixed-variant": "#464747",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f3f3f4",
                        "on-secondary-fixed": "#1b1c1c",
                        "surface-container-high": "#e8e8e8",
                        "secondary": "#5e5e5e",
                        "surface-variant": "#e2e2e2",
                        "on-tertiary-fixed-variant": "#484645",
                        "outline-variant": "#c4c7c7",
                        "primary-fixed-dim": "#c9c6c5",
                        "primary-fixed": "#e5e2e1",
                        "tertiary-container": "#1d1b1a",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#cac6c3",
                        "error-container": "#ffdad6",
                        "on-surface": "#1a1c1c",
                        "outline": "#747878",
                        "surface": "#f9f9f9",
                        "inverse-surface": "#2f3131",
                        "secondary-container": "#e3e2e2",
                        "on-error": "#ffffff",
                        "on-background": "#1a1c1c",
                        "inverse-primary": "#c9c6c5",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#f0f1f1",
                        "secondary-fixed-dim": "#c7c6c6",
                        "primary": "#000000",
                        "on-primary-container": "#858383",
                        "primary-container": "#1c1b1b",
                        "surface-bright": "#f9f9f9",
                        "on-secondary-container": "#646464",
                        "tertiary": "#000000",
                        "secondary-fixed": "#e3e2e2",
                        "surface-container-highest": "#e2e2e2",
                        "surface-container": "#eeeeee",
                        "on-surface-variant": "#444748"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-xl": "120px",
                        "stack-sm": "12px",
                        "gutter": "24px",
                        "margin-page": "64px",
                        "stack-md": "48px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Playfair Display"],
                        "headline-lg": ["Playfair Display"],
                        "label-sm": ["Inter"],
                        "mono-label": ["Inter"],
                        "headline-xl": ["Playfair Display"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["32px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-lg": ["48px", {"lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.12em", "fontWeight": "600"}],
                        "mono-label": ["10px", {"lineHeight": "12px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "headline-xl": ["80px", {"lineHeight": "88px", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid #E5E5E5;
        }
        .skill-card {
            transition: all 0.3s ease;
        }
        .skill-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
        }
        .skill-card.selected {
            background-color: #000000;
            color: #ffffff;
            border-color: #000000;
        }
        .skill-card.selected .material-symbols-outlined {
            color: #ffffff;
        }
        .icon-thin {
            font-variation-settings: 'FILL' 0, 'wght' 100, 'GRAD' 0, 'opsz' 24;
        }
        input:focus {
            outline: none;
            box-shadow: none;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary selection:text-on-primary">
<!-- TopNavBar (Suppressed due to Linear/Transactional intent, replaced with progress header) -->
<header class="w-full px-margin-page py-6 flex flex-col z-50">
<div class="flex justify-between items-center w-full mb-4">
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tighter text-primary">SKILLSPARK</span>
<span class="font-mono-label text-mono-label tracking-widest text-on-surface-variant uppercase">STEP 01 / 03</span>
</div>
<div class="w-full h-[1px] bg-outline-variant/30">
<div class="h-[1px] bg-primary w-1/3 transition-all duration-500"></div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-page py-stack-md w-full max-w-[1440px] mx-auto">
<div class="w-full max-w-4xl grid grid-cols-12 gap-gutter">
<!-- Content Area Offset -->
<div class="col-span-12 md:col-span-10 md:col-start-2 flex flex-col gap-stack-md">
<h1 class="font-headline-xl text-headline-xl text-primary max-w-3xl">What skills do you already have?</h1>
<!-- Bento Grid of Skills -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-6">
<button class="skill-card glass-panel flex flex-col items-center justify-center p-8 rounded-DEFAULT gap-4 group" onclick="this.classList.toggle('selected')">
<span class="material-symbols-outlined icon-thin text-4xl text-primary transition-colors">cut</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">Tailoring</span>
</button>
<button class="skill-card glass-panel flex flex-col items-center justify-center p-8 rounded-DEFAULT gap-4 group" onclick="this.classList.toggle('selected')">
<span class="material-symbols-outlined icon-thin text-4xl text-primary transition-colors">restaurant</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">Cooking</span>
</button>
<button class="skill-card glass-panel flex flex-col items-center justify-center p-8 rounded-DEFAULT gap-4 group" onclick="this.classList.toggle('selected')">
<span class="material-symbols-outlined icon-thin text-4xl text-primary transition-colors">code</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">Coding</span>
</button>
<button class="skill-card glass-panel flex flex-col items-center justify-center p-8 rounded-DEFAULT gap-4 group" onclick="this.classList.toggle('selected')">
<span class="material-symbols-outlined icon-thin text-4xl text-primary transition-colors">palette</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">Design</span>
</button>
<button class="skill-card glass-panel flex flex-col items-center justify-center p-8 rounded-DEFAULT gap-4 group" onclick="this.classList.toggle('selected')">
<span class="material-symbols-outlined icon-thin text-4xl text-primary transition-colors">auto_fix_high</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">Editing</span>
</button>
<button class="skill-card glass-panel flex flex-col items-center justify-center p-8 rounded-DEFAULT gap-4 group" onclick="this.classList.toggle('selected')">
<span class="material-symbols-outlined icon-thin text-4xl text-primary transition-colors">translate</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">Language</span>
</button>
<button class="skill-card glass-panel flex flex-col items-center justify-center p-8 rounded-DEFAULT gap-4 group" onclick="this.classList.toggle('selected')">
<span class="material-symbols-outlined icon-thin text-4xl text-primary transition-colors">camera_alt</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">Photo</span>
</button>
<button class="skill-card glass-panel flex flex-col items-center justify-center p-8 rounded-DEFAULT gap-4 group" onclick="this.classList.toggle('selected')">
<span class="material-symbols-outlined icon-thin text-4xl text-primary transition-colors">build</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">Repair</span>
</button>
</div>
<!-- Add Custom Skill -->
<div class="mt-8 flex items-end gap-4 w-full max-w-md">
<span class="material-symbols-outlined icon-thin text-secondary mb-2">add</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:border-b-2 focus:ring-0 px-0 py-2 font-body-lg text-body-lg text-primary placeholder-on-surface-variant/50 transition-all" placeholder="Add your own skill..." type="text"/>
</div>
<!-- Bottom CTA -->
<div class="mt-stack-sm pt-8 flex justify-end w-full">
<button class="bg-primary text-on-primary font-label-sm text-label-sm uppercase tracking-[0.2em] px-12 py-4 rounded-DEFAULT hover:scale-[1.02] transition-transform duration-300 shadow-[0_20px_40px_rgba(0,0,0,0.1)] flex items-center gap-2">
                        Continue
                        <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</div>
</div>
</main>
<!-- Footer Suppressed as this is a transactional flow -->
</body></html>
