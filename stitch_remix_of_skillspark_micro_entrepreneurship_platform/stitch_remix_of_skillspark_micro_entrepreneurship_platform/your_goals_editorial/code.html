<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            -webkit-font-smoothing: antialiased;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid #E5E5E5;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid #E5E5E5;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            transform: translateY(-2px);
        }
        .glass-card.active {
            border-color: theme('colors.primary');
            background: theme('colors.surface-container-lowest');
        }
        
        .segmented-control input[type="radio"] {
            display: none;
        }
        .segmented-control label {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .segmented-control input[type="radio"]:checked + label {
            background-color: theme('colors.primary');
            color: theme('colors.on-primary');
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="min-h-screen flex flex-col relative overflow-x-hidden selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top Navigation (Suppressed per rules: Linear/Transactional Flow - Step 3 of 3) -->
<header class="fixed top-0 w-full z-50 px-margin-page py-6 flex justify-between items-center pointer-events-none">
<div class="font-headline-lg font-bold tracking-tighter text-primary">SKILLSPARK</div>
<div class="font-mono-label text-mono-label tracking-widest text-on-surface-variant">STEP 3 OF 3</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col justify-center px-margin-page pt-32 pb-margin-page">
<!-- Asymmetric Grid Layout -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-gutter max-w-7xl mx-auto w-full">
<!-- Left Column: Context / Image / Negative Space -->
<div class="md:col-span-4 lg:col-span-5 hidden md:flex flex-col justify-end pb-stack-xl pr-12">
<div class="relative w-full aspect-[3/4] rounded-lg overflow-hidden glass-panel">
<img class="w-full h-full object-cover grayscale opacity-90 mix-blend-multiply" data-alt="A striking minimalist workspace featuring a sleek laptop, an architectural desk lamp casting crisp shadows, and an open high-quality sketchbook. The scene is rendered in stark black and white with high-contrast studio lighting, emphasizing geometric shapes and negative space. The mood is focused, ambitious, and precise, aligning perfectly with a premium editorial aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBICX2iJWaxFrECn364Mua8h8u4EQhukBysbVo75QBjahm3EHlw6WjAiOtKvyXiQh5V6xGFi98loub7a-Jb3y2AfKJraosKGxmYTxUA_n3tOc3WSJ5ereon-N0QkvpRuCjk6GxrSMOoLLuMCyUe-5w3RhUCD2Yxj9Ho4cpuOhq-VcE-bY4RN5guUw5F7tUScBlphBYg-S2otUbnLNE65Ua0TPdOtU_lyqZZqAIVi8fKWi1fKvrfZplvWM7C_BEqSiQ_HN51lJYzCAVN"/>
</div>
</div>
<!-- Right Column: Interactive Form Area -->
<div class="md:col-span-8 lg:col-span-7 flex flex-col justify-center">
<div class="max-w-xl">
<h1 class="font-headline-xl text-headline-xl text-primary mb-stack-md">
                        How much time can you give each week?
                    </h1>
<!-- Segmented Toggle -->
<div class="mb-stack-xl">
<div class="inline-flex glass-panel p-1 rounded-full segmented-control w-full sm:w-auto border-outline-variant/30">
<input checked="" id="time_1" name="time_commitment" type="radio" value="0-5"/>
<label class="font-label-sm text-label-sm uppercase tracking-[0.1em] px-8 py-4 rounded-full text-on-surface-variant text-center flex-1 sm:flex-none" for="time_1">0-5 hrs</label>
<input id="time_2" name="time_commitment" type="radio" value="5-15"/>
<label class="font-label-sm text-label-sm uppercase tracking-[0.1em] px-8 py-4 rounded-full text-on-surface-variant text-center flex-1 sm:flex-none" for="time_2">5-15 hrs</label>
<input id="time_3" name="time_commitment" type="radio" value="15+"/>
<label class="font-label-sm text-label-sm uppercase tracking-[0.1em] px-8 py-4 rounded-full text-on-surface-variant text-center flex-1 sm:flex-none" for="time_3">15+ hrs</label>
</div>
</div>
<!-- Goal Selector (Bento Grid) -->
<div class="mb-stack-xl">
<h2 class="font-mono-label text-mono-label text-on-surface-variant tracking-widest mb-stack-sm uppercase">Primary Objective</h2>
<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
<!-- Card 1 -->
<button class="glass-card p-6 rounded-xl flex flex-col items-start text-left focus:outline-none focus:ring-1 focus:ring-primary group active" onclick="toggleCard(this)">
<span class="material-symbols-outlined text-[32px] text-primary mb-4 group-hover:scale-110 transition-transform duration-300">payments</span>
<span class="font-label-sm text-label-sm uppercase tracking-[0.1em] text-primary mt-auto">Extra Income</span>
</button>
<!-- Card 2 -->
<button class="glass-card p-6 rounded-xl flex flex-col items-start text-left focus:outline-none focus:ring-1 focus:ring-primary group" onclick="toggleCard(this)">
<span class="material-symbols-outlined text-[32px] text-on-surface-variant mb-4 group-hover:scale-110 transition-transform duration-300">work_off</span>
<span class="font-label-sm text-label-sm uppercase tracking-[0.1em] text-on-surface-variant mt-auto">Replace my job</span>
</button>
<!-- Card 3 -->
<button class="glass-card p-6 rounded-xl flex flex-col items-start text-left focus:outline-none focus:ring-1 focus:ring-primary group" onclick="toggleCard(this)">
<span class="material-symbols-outlined text-[32px] text-on-surface-variant mb-4 group-hover:scale-110 transition-transform duration-300">rocket_launch</span>
<span class="font-label-sm text-label-sm uppercase tracking-[0.1em] text-on-surface-variant mt-auto">Build something big</span>
</button>
</div>
</div>
<!-- Final CTA -->
<button class="w-full bg-primary text-on-primary py-6 px-8 rounded-lg hover:scale-[1.02] transition-transform duration-300 flex justify-between items-center shadow-[inset_0_1px_1px_rgba(255,255,255,0.2)]">
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tighter">Show My Business Ideas</span>
<span class="material-symbols-outlined text-on-primary">arrow_forward</span>
</button>
</div>
</div>
</div>
</main>
<script>
        function toggleCard(clickedCard) {
            // Remove active class and reset colors from all cards
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                card.classList.remove('active');
                const icon = card.querySelector('.material-symbols-outlined');
                const text = card.querySelector('.font-label-sm');
                icon.classList.remove('text-primary');
                icon.classList.add('text-on-surface-variant');
                text.classList.remove('text-primary');
                text.classList.add('text-on-surface-variant');
            });

            // Add active class and set colors to clicked card
            clickedCard.classList.add('active');
            const clickedIcon = clickedCard.querySelector('.material-symbols-outlined');
            const clickedText = clickedCard.querySelector('.font-label-sm');
            
            clickedIcon.classList.remove('text-on-surface-variant');
            clickedIcon.classList.add('text-primary');
            clickedText.classList.remove('text-on-surface-variant');
            clickedText.classList.add('text-primary');
        }
    </script>
