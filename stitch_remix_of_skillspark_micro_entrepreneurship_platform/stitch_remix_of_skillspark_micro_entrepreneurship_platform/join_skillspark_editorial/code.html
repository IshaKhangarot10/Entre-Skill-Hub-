<style>
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid #E5E5E5;
        }
        
        .input-line {
            border: none;
            border-bottom: 1px solid #c4c7c7;
            background: transparent;
            transition: border-bottom-width 0.2s ease, border-bottom-color 0.2s ease;
        }
        
        .input-line:focus {
            outline: none;
            border-bottom: 2px solid #000000;
            box-shadow: none;
        }

        .input-line::placeholder {
            color: transparent;
        }
        
        .form-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .form-label {
            position: absolute;
            top: 0.5rem;
            left: 0;
            transition: all 0.2s ease;
            pointer-events: none;
            color: #747878;
        }

        .input-line:focus ~ .form-label,
        .input-line:not(:placeholder-shown) ~ .form-label {
            top: -1rem;
            font-size: 10px;
            color: #000000;
            letter-spacing: 0.05em;
        }

        .shadow-studio {
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md antialiased selection:bg-surface-variant selection:text-primary">
<!-- TopNavBar (Suppressed due to Transactional/Onboarding intent) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-page py-6">
<a class="font-headline-lg text-headline-lg font-bold tracking-tighter text-primary" href="#">SKILLSPARK</a>
<a class="font-label-sm text-label-sm uppercase tracking-[0.2em] text-on-surface-variant/60 hover:text-primary transition-colors duration-300" href="#">SIGN IN</a>
</header>
<main class="min-h-screen flex items-center justify-center px-margin-page py-stack-xl relative overflow-hidden">
<!-- Abstract Background Element for tension -->
<div class="absolute top-[-20%] left-[-10%] w-[60%] h-[140%] bg-surface-container-highest/20 -rotate-12 blur-3xl rounded-full z-0 pointer-events-none"></div>
<div class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-12 gap-gutter items-center z-10 relative mt-stack-md">
<!-- Left Side: Oversized Editorial Label -->
<div class="col-span-1 lg:col-span-5 lg:col-start-2 hidden md:block">
<h1 class="font-headline-xl text-headline-xl text-primary leading-[0.8] tracking-tighter">JOIN</h1>
<p class="font-body-lg text-body-lg text-secondary mt-stack-sm max-w-md">Access the definitive technical lookbook. Elevate your craft with stark clarity.</p>
</div>
<!-- Right Side: Frosted Glass Form Card -->
<div class="col-span-1 lg:col-span-5 lg:col-start-8 w-full max-w-md mx-auto">
<div class="glass-panel shadow-studio p-8 lg:p-12">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-8 md:hidden">JOIN</h2>
<div class="mb-stack-md">
<div class="flex gap-6 border-b border-outline-variant/30 pb-2">
<button class="font-mono-label text-mono-label tracking-widest text-primary border-b-2 border-primary pb-2 -mb-[9px] relative z-10 uppercase" onclick="toggleAuthType('email')">EMAIL</button>
<button class="font-mono-label text-mono-label tracking-widest text-on-surface-variant pb-2 -mb-[9px] hover:text-primary transition-colors uppercase" onclick="toggleAuthType('phone')">PHONE</button>
</div>
</div>
<form class="flex flex-col gap-6">
<div class="form-group">
<input class="input-line w-full py-2 font-body-md text-body-md text-primary" id="name" placeholder="NAME" required="" type="text"/>
<label class="form-label font-mono-label text-mono-label uppercase tracking-widest" for="name">FULL NAME</label>
</div>
<div class="form-group" id="email-group">
<input class="input-line w-full py-2 font-body-md text-body-md text-primary" id="email" placeholder="EMAIL" required="" type="email"/>
<label class="form-label font-mono-label text-mono-label uppercase tracking-widest" for="email">EMAIL ADDRESS</label>
</div>
<div class="form-group hidden" id="phone-group">
<input class="input-line w-full py-2 font-body-md text-body-md text-primary" id="phone" placeholder="PHONE" type="tel"/>
<label class="form-label font-mono-label text-mono-label uppercase tracking-widest" for="phone">PHONE NUMBER</label>
</div>
<div class="form-group">
<input class="input-line w-full py-2 font-body-md text-body-md text-primary" id="password" placeholder="PASSWORD" required="" type="password"/>
<label class="form-label font-mono-label text-mono-label uppercase tracking-widest" for="password">PASSWORD</label>
<button class="absolute right-0 top-2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
<div class="mt-stack-sm flex items-center justify-between">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative w-4 h-4 border border-outline group-hover:border-primary flex items-center justify-center transition-colors">
<input class="absolute opacity-0 w-full h-full cursor-pointer peer" type="checkbox"/>
<span class="material-symbols-outlined text-[14px] text-primary opacity-0 peer-checked:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 0;">check</span>
</div>
<span class="font-mono-label text-mono-label text-secondary tracking-widest uppercase">STAY SIGNED IN</span>
</label>
</div>
<button class="w-full bg-primary text-on-primary font-label-sm text-label-sm uppercase tracking-[0.2em] py-4 mt-stack-sm hover:scale-[1.02] transition-transform duration-200 shadow-[inset_0_1px_0_rgba(255,255,255,0.2)]" type="submit">
                            CREATE ACCOUNT
                        </button>
<p class="font-mono-label text-mono-label text-secondary text-center tracking-widest mt-4">
                            ALREADY HAVE AN ACCOUNT? <a class="text-primary hover:underline underline-offset-4" href="#">SIGN IN</a>
</p>
</form>
</div>
</div>
</div>
</main>
<!-- Footer (Suppressed due to Transactional/Onboarding intent) -->
<script>
        function toggleAuthType(type) {
            const emailGroup = document.getElementById('email-group');
            const phoneGroup = document.getElementById('phone-group');
            const emailInput = document.getElementById('email');
            const phoneInput = document.getElementById('phone');
            const tabs = document.querySelectorAll('.border-b-2');
            
            // Reset tabs
            const allTabs = document.querySelectorAll('button[onclick^="toggleAuthType"]');
            allTabs.forEach(tab => {
                tab.className = "font-mono-label text-mono-label tracking-widest text-on-surface-variant pb-2 -mb-[9px] hover:text-primary transition-colors uppercase";
            });

            // Activate clicked tab
            event.currentTarget.className = "font-mono-label text-mono-label tracking-widest text-primary border-b-2 border-primary pb-2 -mb-[9px] relative z-10 uppercase";

            if (type === 'email') {
                emailGroup.classList.remove('hidden');
                phoneGroup.classList.add('hidden');
                emailInput.setAttribute('required', 'required');
                phoneInput.removeAttribute('required');
                emailInput.focus();
            } else {
                emailGroup.classList.add('hidden');
                phoneGroup.classList.remove('hidden');
                phoneInput.setAttribute('required', 'required');
                emailInput.removeAttribute('required');
                phoneInput.focus();
            }
        }
    </script>
</body></html>
