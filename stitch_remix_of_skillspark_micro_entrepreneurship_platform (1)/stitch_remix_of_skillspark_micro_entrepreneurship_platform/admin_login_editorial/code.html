<style>
        .glass-card {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid #E5E5E5;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
        }
        .input-minimal {
            border: none;
            border-bottom: 1px solid #c4c7c7;
            background: transparent;
            transition: border-bottom-width 0.2s ease, border-color 0.2s ease;
        }
        .input-minimal:focus {
            outline: none;
            border-bottom: 2px solid #000000;
            box-shadow: none;
        }
        .segment-input {
            width: 40px;
            height: 48px;
            text-align: center;
            border: 1px solid #c4c7c7;
            background: transparent;
            transition: border-color 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 500;
        }
        .segment-input:focus {
            outline: none;
            border-color: #000000;
            border-width: 2px;
        }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col items-center justify-center font-body-md antialiased overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Ambient background element for depth -->
<div class="fixed inset-0 pointer-events-none opacity-[0.02]" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 24px 24px;"></div>
<main class="w-full max-w-md px-gutter relative z-10">
<!-- Brand Anchor -->
<div class="text-center mb-stack-md">
<h1 class="font-label-sm text-label-sm uppercase tracking-[0.2em] text-on-surface-variant">
                SKILLSPARK
            </h1>
</div>
<!-- Login Card -->
<div class="glass-card rounded-lg p-margin-page relative overflow-hidden">
<!-- Subtle inner bevel effect -->
<div class="absolute inset-0 border-t border-l border-white/50 rounded-lg pointer-events-none"></div>
<div class="mb-gutter">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary text-center">
                    Admin Access
                </h2>
</div>
<form class="space-y-stack-md">
<!-- Email Field -->
<div class="space-y-stack-sm">
<label class="block font-mono-label text-mono-label uppercase tracking-widest text-on-surface-variant" for="email">
                        Email Address
                    </label>
<input autocomplete="email" class="input-minimal w-full py-2 font-body-md text-on-surface placeholder-outline-variant focus:ring-0" id="email" placeholder="admin@skillspark.io" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-stack-sm">
<label class="block font-mono-label text-mono-label uppercase tracking-widest text-on-surface-variant" for="password">
                        Password
                    </label>
<input autocomplete="current-password" class="input-minimal w-full py-2 font-body-md text-on-surface placeholder-outline-variant focus:ring-0" id="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- 2FA Segments -->
<div class="space-y-stack-sm pt-4">
<label class="block font-mono-label text-mono-label uppercase tracking-widest text-on-surface-variant text-center">
                        Two-Factor Authentication
                    </label>
<div class="flex justify-between gap-2" id="otp-container">
<input aria-label="Digit 1" class="segment-input rounded-DEFAULT" inputmode="numeric" maxlength="1" pattern="[0-9]" type="number"/>
<input aria-label="Digit 2" class="segment-input rounded-DEFAULT" inputmode="numeric" maxlength="1" pattern="[0-9]" type="number"/>
<input aria-label="Digit 3" class="segment-input rounded-DEFAULT" inputmode="numeric" maxlength="1" pattern="[0-9]" type="number"/>
<span class="text-outline-variant flex items-center justify-center">-</span>
<input aria-label="Digit 4" class="segment-input rounded-DEFAULT" inputmode="numeric" maxlength="1" pattern="[0-9]" type="number"/>
<input aria-label="Digit 5" class="segment-input rounded-DEFAULT" inputmode="numeric" maxlength="1" pattern="[0-9]" type="number"/>
<input aria-label="Digit 6" class="segment-input rounded-DEFAULT" inputmode="numeric" maxlength="1" pattern="[0-9]" type="number"/>
</div>
</div>
<!-- CTA -->
<div class="pt-6">
<button class="w-full bg-primary text-on-primary py-4 font-label-sm text-label-sm uppercase tracking-[0.12em] hover:scale-[1.02] transition-transform duration-200 flex justify-center items-center gap-2 group shadow-[inset_0_1px_0_rgba(255,255,255,0.2)] rounded-sm" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[16px] group-hover:translate-x-1 transition-transform" style="font-variation-settings: 'wght' 200;">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Footer -->
<div class="mt-stack-md text-center">
<p class="font-mono-label text-mono-label uppercase tracking-widest text-outline">
                Authorized personnel only
            </p>
</div>
</main>
<script>
        // Simple script to handle auto-advance on the segmented OTP input
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('otp-container');
            if(container) {
                const inputs = container.querySelectorAll('.segment-input');
                
                inputs.forEach((input, index) => {
                    input.addEventListener('input', (e) => {
                        // Ensure only numbers are entered
                        input.value = input.value.replace(/[^0-9]/g, '');
                        
                        // Limit to 1 character
                        if (input.value.length > 1) {
                            input.value = input.value.slice(0, 1);
                        }

                        // Auto-advance
                        if (input.value.length === 1 && index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    });

                    input.addEventListener('keydown', (e) => {
                        // Handle backspace
                        if (e.key === 'Backspace' && !input.value && index > 0) {
                            inputs[index - 1].focus();
                        }
                    });
                    
                    // Handle paste event
                    input.addEventListener('paste', (e) => {
                        e.preventDefault();
                        const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '');
                        
                        if (pastedData) {
                            for (let i = 0; i < inputs.length; i++) {
                                if (i + index < inputs.length && i < pastedData.length) {
                                    inputs[i + index].value = pastedData[i];
                                    if(i + index === inputs.length - 1) {
                                        inputs[i + index].focus();
                                    } else {
                                        inputs[i + index + 1].focus();
                                    }
                                }
                            }
                        }
                    });
                });
            }
        });
    </script>
</body></html>
