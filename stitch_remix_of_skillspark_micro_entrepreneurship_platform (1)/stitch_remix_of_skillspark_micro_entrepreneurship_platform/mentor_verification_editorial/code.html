<!-- Lightweight interaction script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input[type="file"]');
            
            inputs.forEach(input => {
                input.addEventListener('change', (e) => {
                    const label = input.closest('label');
                    const textSpan = label.querySelector('.font-label-sm');
                    const iconSpan = label.querySelector('.material-symbols-outlined');
                    
                    if (e.target.files && e.target.files.length > 0) {
                        const fileName = e.target.files[0].name;
                        // Update UI to show file selected state
                        textSpan.textContent = 'FILE SELECTED';
                        textSpan.classList.replace('text-on-surface-variant', 'text-primary');
                        iconSpan.textContent = 'check_circle';
                        iconSpan.classList.replace('text-outline-variant', 'text-primary');
                        label.classList.replace('hairline-dashed', 'border-solid');
                        label.classList.add('border-primary', 'bg-surface-container');
                    }
                });
            });
        });
    </script>
